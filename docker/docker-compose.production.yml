# ============================================
# ARETON.id — Production Docker Compose
# ============================================
# Usage:
#   docker compose -f docker/docker-compose.production.yml up -d
#   docker compose -f docker/docker-compose.production.yml logs -f api
# ============================================

version: '3.9'

services:
  # ── API Server ─────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: areton-api
    restart: unless-stopped
    ports:
      - '4000:4000'
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${DB_USER:-areton}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-areton_db}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
      API_BASE_URL: https://api.areton.id
      CORS_ORIGINS: https://areton.id,https://admin.areton.id
      # Third-party services
      XENDIT_SECRET_KEY: ${XENDIT_SECRET_KEY:-}
      XENDIT_WEBHOOK_TOKEN: ${XENDIT_WEBHOOK_TOKEN:-}
      NOWPAYMENTS_API_KEY: ${NOWPAYMENTS_API_KEY:-}
      NOWPAYMENTS_IPN_SECRET: ${NOWPAYMENTS_IPN_SECRET:-}
      DOKU_CLIENT_ID: ${DOKU_CLIENT_ID:-}
      DOKU_SECRET_KEY: ${DOKU_SECRET_KEY:-}
      DOKU_PUBLIC_KEY: ${DOKU_PUBLIC_KEY:-}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL:-}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_WHATSAPP_FROM: ${TWILIO_WHATSAPP_FROM:-}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-noreply@areton.id}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      APPLE_CLIENT_ID: ${APPLE_CLIENT_ID:-}
      APPLE_TEAM_ID: ${APPLE_TEAM_ID:-}
      APPLE_KEY_ID: ${APPLE_KEY_ID:-}
      APPLE_PRIVATE_KEY: ${APPLE_PRIVATE_KEY:-}
      EKYC_API_KEY: ${EKYC_API_KEY:-}
      EKYC_API_URL: ${EKYC_API_URL:-https://api.verihubs.com/v1}
      EKYC_ENCRYPTION_KEY: ${EKYC_ENCRYPTION_KEY:-}
    volumes:
      - api_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  # ── PostgreSQL ─────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: areton-postgres
    restart: unless-stopped
    ports:
      - '127.0.0.1:5432:5432' # Only expose to localhost
    environment:
      POSTGRES_DB: ${DB_NAME:-areton_db}
      POSTGRES_USER: ${DB_USER:-areton}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: '--encoding=UTF8 --locale=C'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-backup:/backups
    healthcheck:
      test: ['CMD-EXEC', 'pg_isready -U ${DB_USER:-areton} -d ${DB_NAME:-areton_db}']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    command: >
      postgres
        -c shared_buffers=256MB
        -c effective_cache_size=512MB
        -c maintenance_work_mem=128MB
        -c work_mem=16MB
        -c max_connections=100
        -c log_min_duration_statement=1000
        -c log_statement=none

  # ── Redis ──────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: areton-redis
    restart: unless-stopped
    ports:
      - '127.0.0.1:6379:6379' # Only expose to localhost
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      redis-server
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --appendonly yes
        --appendfsync everysec
        ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # ── Nginx Reverse Proxy ───────────────────
  nginx:
    image: nginx:alpine
    container_name: areton-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - api_uploads:/app/uploads:ro
    depends_on:
      - api
    deploy:
      resources:
        limits:
          memory: 128M

  # ── Certbot (SSL) ─────────────────────────
  certbot:
    image: certbot/certbot
    container_name: areton-certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  # ── Prometheus (Monitoring) ────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: areton-prometheus
    restart: unless-stopped
    ports:
      - '127.0.0.1:9090:9090'
    volumes:
      - ../infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../infra/monitoring/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=5GB'
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Grafana (Dashboard) ───────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: areton-grafana
    restart: unless-stopped
    ports:
      - '127.0.0.1:3100:3000'
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_SERVER_ROOT_URL: https://monitor.areton.id
      GF_INSTALL_PLUGINS: grafana-clock-panel
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  api_uploads:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  default:
    name: areton-network
    driver: bridge
