# Prometheus Configuration — ARETON.id
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# Alert rules
rule_files:
  - 'alerts.yml'

# Scrape targets
scrape_configs:
  # ── NestJS API Metrics ──────────────────────
  - job_name: 'areton-api'
    metrics_path: '/api/metrics'
    static_configs:
      - targets: ['host.docker.internal:4000']
        labels:
          service: 'areton-api'
          environment: 'production'

  # ── Node Exporter (System) ──────────────────
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'system'
          environment: 'production'

  # ── Prometheus self-monitoring ──────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
