version: '3.9'

services:
  # ── PostgreSQL ─────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: areton-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: areton_db
      POSTGRES_USER: areton
      POSTGRES_PASSWORD: areton_dev_2026
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-EXEC', 'pg_isready -U areton -d areton_db']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: areton-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── pgAdmin (optional — dev only) ─────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: areton-pgadmin
    restart: unless-stopped
    ports:
      - '5050:80'
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@areton.id
      PGADMIN_DEFAULT_PASSWORD: admin123
    depends_on:
      - postgres
    profiles:
      - tools

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
